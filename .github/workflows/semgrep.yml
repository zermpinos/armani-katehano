name: SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC -- matches deps-audit cadence

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (javascript-typescript)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Semgrep
        run: pip3 install semgrep==1.161.0 --quiet

      - name: Run Semgrep
        run: semgrep scan --config=p/typescript --config=p/nodejs --config=p/secrets --error .
