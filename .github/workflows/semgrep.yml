name: SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC -- matches deps-audit cadence

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (javascript-typescript)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48 # v1.161.0
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Semgrep
        run: semgrep scan --config=p/typescript --config=p/nodejs --config=p/secrets --error .
