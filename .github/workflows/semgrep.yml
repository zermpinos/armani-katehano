name: SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC - matches deps-audit cadence

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (javascript-typescript)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Semgrep
        run: |
          python3 -m venv /tmp/semgrep-venv
          /tmp/semgrep-venv/bin/pip install -r .github/requirements.txt --quiet
          echo "/tmp/semgrep-venv/bin" >> $GITHUB_PATH

      - name: Run Semgrep
        run: semgrep scan --config=p/typescript --config=p/nodejs --config=p/secrets --error .
