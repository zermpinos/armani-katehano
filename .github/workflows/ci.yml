name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR - saves runner time
# when you push rapidly.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Check & Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - run: npx tsc --noEmit

      - run: npm test
        env:
          SESSION_SECRET: ci-placeholder-secret

      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: ci-placeholder-secret

      # Audit backstop: verify the produced middleware bundle pulls in no
      # Node built-ins. ESLint zones + `server-only` markers should already
      # keep these out at source - this catches the case where any of those
      # were bypassed. See docs/architecture.md §4.
      - name: Verify middleware bundle has no Node built-ins
        run: node scripts/check-middleware-bundle.mjs
