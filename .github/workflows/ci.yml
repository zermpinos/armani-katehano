name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR - saves runner time
# when you push rapidly.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - run: npx tsc --noEmit

      - run: npm test
        env:
          SESSION_SECRET: ci-placeholder-secret

      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: ci-placeholder-secret

      - name: Verify build artifacts (L3 + L5)
        if: github.actor != 'dependabot[bot]'
        run: npm run test:build && node scripts/check-isr-pages.mjs
        env:
          SESSION_SECRET: ci-placeholder-secret

      # Audit backstop: verify the built proxy still runs on the runtime the
      # codebase is written against, and pulls in nothing we keep off the
      # request path. ESLint zones should already catch this at source; this
      # covers the case where they were bypassed. See docs/architecture.md §4.
      - name: Verify proxy runtime and bundle
        if: github.actor != 'dependabot[bot]'
        run: node scripts/check-proxy-bundle.mjs
