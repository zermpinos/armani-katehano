name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR — saves runner time
# when you push rapidly.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Check & Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - run: npx tsc --noEmit

      - run: npm test
        env:
          SESSION_SECRET: ci-placeholder-secret

      # Build prerenders getStaticProps pages (ISR), which requires a real
      # database connection. Skipped for Dependabot — its PRs don't receive
      # repository secrets, so next build fails at the prerender step.
      - name: Build
        if: github.actor != 'dependabot[bot]'
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      # Audit backstop: verify the produced middleware bundle pulls in no
      # Node built-ins. ESLint zones + `server-only` markers should already
      # keep these out at source — this catches the case where any of those
      # were bypassed. See docs/architecture.md §4.
      - name: Verify middleware bundle has no Node built-ins
        if: github.actor != 'dependabot[bot]'
        run: node scripts/check-middleware-bundle.mjs
