name: Dependency Audit

on:
  push:
    branches: [main]
    paths: [package-lock.json]
  pull_request:
    branches: [main]
    paths: [package-lock.json]
  # Run weekly even if deps haven't changed — new CVEs appear constantly.
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC

permissions:
  contents: read

jobs:
  audit-prod:
    name: npm audit (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev

  audit-dev:
    name: npm audit (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Audit devDependencies separately so build-chain CVEs are caught.
      # --production=false is the default but explicit for clarity.
      - run: npm audit --only=dev
