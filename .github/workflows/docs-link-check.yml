name: Docs link check

on:
  pull_request:
    paths:
      - 'README.md'
      - 'SECURITY.md'
      - 'docs/**'
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lychee link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --no-progress --max-redirects 5 README.md SECURITY.md docs/
          fail: true
