name: Discover and import games

# Hourly heartbeat. The endpoint decides whether there is work to do
# (admin-scheduled UpcomingGame in window with no IMPORTED job).
#
# Required repository secrets:
#   CRON_SECRET    — same value as the Vercel env var
#   APP_BASE_URL   — e.g. https://armani-katehano.com (no trailing slash)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: discover-and-import
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger discover-and-import
        env:
          CRON_SECRET:  ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${APP_BASE_URL:-}" ]; then
            echo "::error::CRON_SECRET and APP_BASE_URL repository secrets must be set"
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL}/api/cron/discover-and-import"
          echo
