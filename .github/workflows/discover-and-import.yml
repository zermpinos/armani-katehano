name: Discover and import games

# This workflow is intentionally a no-op.
# The discover-and-import cron is now managed by Vercel (vercel.json)
# which runs the endpoint from Vercel's own infrastructure, bypassing
# the WAF rate-limiting that caused 429 errors from GitHub-hosted runners.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: discover-and-import
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Cron managed by Vercel
        run: |
          echo "discover-and-import is triggered by Vercel cron (vercel.json)."
          echo "This GitHub Actions workflow is kept as a schedule placeholder only."
