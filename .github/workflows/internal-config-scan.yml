name: internal-config-scan

on:
  pull_request:
    branches: [main]

jobs:
  scan:
    name: block proprietary local config from PRs
    runs-on: self-hosted
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main

      # scan-diff.mjs uses only Node built-ins — no npm install required.
      - name: Run scan-diff
        run: bash scripts/scrub/scan-diff.sh origin/main
