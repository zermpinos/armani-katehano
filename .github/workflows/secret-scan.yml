name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          mkdir -p "$HOME/bin"
          mv gitleaks "$HOME/bin/"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Compute scan range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            from="$PR_BASE"
            to="$PR_HEAD"
          else
            from="$PUSH_BEFORE"
            to="$PUSH_AFTER"
            # New branch (zero SHA) or force-push from an unreachable SHA:
            # fall back to scanning just the tip commit.
            if [ "$from" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "${from}^{commit}" 2>/dev/null; then
              from="$(git rev-parse "${to}^" 2>/dev/null || echo "$to")"
            fi
          fi
          echo "from=$from" >> "$GITHUB_OUTPUT"
          echo "to=$to"     >> "$GITHUB_OUTPUT"
          echo "Scanning range ${from}..${to}"

      - name: Run gitleaks
        env:
          RANGE_FROM: ${{ steps.range.outputs.from }}
          RANGE_TO: ${{ steps.range.outputs.to }}
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --log-opts="${RANGE_FROM}..${RANGE_TO}" \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1

      - name: Upload report artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          if-no-files-found: ignore
