name: Secret Scan Audit

# Report-only weekly audit of the full published main history. Catches drift
# and historical exposure without blocking merges. The push gate in
# secret-scan.yml handles new leaks (delta-scoped, fail-on-find).

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: main

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          mkdir -p "$HOME/bin"
          mv gitleaks "$HOME/bin/"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Audit origin/main history (report-only)
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --log-opts="origin/main" \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 0

      - name: Upload audit artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-audit
          path: gitleaks.sarif
          if-no-files-found: ignore
