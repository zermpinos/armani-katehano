name: E2E Tests (Vercel Preview)

on:
  deployment_status:

concurrency:
  # One E2E run per deployment - cancel stale if a new deploy lands.
  group: e2e-${{ github.event.deployment_status.environment_url }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed for deployment_status context
  deployments: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: self-hosted
    timeout-minutes: 15
    if: github.event.deployment_status.state == 'success'
    # Playwright does not yet recognise ubuntu26.04 in its platform map (upstream
    # fix tracked in microsoft/playwright#40117, targeting v1.61). Override to the
    # 24.04 binaries, which are ABI-compatible and run on 26.04 via t64 libs.
    env:
      PLAYWRIGHT_HOST_PLATFORM_OVERRIDE: ubuntu24.04-x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      # On a persistent self-hosted runner, ~/.cache/ms-playwright survives
      # between runs. playwright install is idempotent - skips the download
      # when the browser binary is already present for the current version.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          ADMIN_SLUG: ${{ secrets.ADMIN_SLUG }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 7
