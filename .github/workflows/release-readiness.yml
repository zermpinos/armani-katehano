name: Release readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  require-public-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Required public-release files present
        run: |
          set -euo pipefail
          missing=0
          git ls-files | grep -qE '^LICENSE$' || { echo "::error::LICENSE missing"; missing=1; }
          git ls-files | grep -qE '^\.env\.example$' || { echo "::error::.env.example missing"; missing=1; }
          exit $missing
