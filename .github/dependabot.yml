version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      # One PR per week with every safe (minor/patch) bump bundled.
      # Majors stay out of this group — they need manual review.
      all-npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # ESLint 10: blocked until eslint-plugin-import (transitive via
      # eslint-config-next) ships a release with peer eslint ^10.
      # Current eslint-plugin-import@2.32.0 peer: "... || ^9".
      # Track upstream: https://github.com/import-js/eslint-plugin-import
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript 6: blocked until tsconfig.json no longer uses baseUrl
      # (TS 6 deprecates with TS5101 error; TS 7 removes). See Task 8.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-actions:
        patterns:
          - "*"
